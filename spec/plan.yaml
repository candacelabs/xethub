  - "Mock upstream, ignore downstream — each agent tests in isolation"
  - "All rusqlite operations use std::sync::Mutex, not tokio::sync::Mutex"
  - "All SQLite connections set PRAGMA journal_mode=WAL on open"
  - "Bulk inserts MUST use explicit transactions (BEGIN/COMMIT)"
  - "Presigned URL fallback is mandatory — if signer is None, use server-proxied URLs"
  - "xorb_metadata fallback is mandatory — if metadata empty, fetch and parse xorb"
