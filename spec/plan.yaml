      # Agent A10: Rebuild-Index CLI

      You are implementing the `openxet-server rebuild-index` subcommand.
      It scans all shards and xorbs in S3/storage and populates the SQLite indexes from scratch.

      ## Context

      Agent A5 created a stub `crates/server/src/rebuild.rs`. You replace it with the full implementation.

      The function signature is: `pub async fn run_rebuild(config: &AppConfig) -> anyhow::Result<()>`

      It's called from main.rs when the user runs `openxet-server rebuild-index`.

      ## Implementation

      ```rust
      use anyhow::Context;
      use openxet_cas_types::chunk::ChunkHeader;
      use openxet_cas_types::shard::Shard;
      use openxet_hashing::compute_chunk_hash;

      use crate::config::AppConfig;
      use crate::storage::{
          build_storage, StorageBackend,
          SqliteFileIndex, SqliteChunkIndex, SqliteXorbMetadataIndex,
          ChunkIndex, FileIndex, XorbMetadataIndex, XorbChunkMetadata,
          ChunkLocation,
      };

      pub async fn run_rebuild(config: &AppConfig) -> anyhow::Result<()> {
          tracing::info!("starting index rebuild");

          // Build storage backend (S3/filesystem)
          let storage = build_storage(&config.storage).await
              .context("failed to initialize storage")?;

          // Create fresh SQLite indexes
          let db_path = config.data_dir().join("index.db");
          if db_path.exists() {
              tracing::warn!("removing existing index database: {}", db_path.display());
              std::fs::remove_file(&db_path)?;
          }

          let file_index = SqliteFileIndex::new(&db_path)?;
          let chunk_index = SqliteChunkIndex::new(&db_path)?;
          let xorb_meta_index = SqliteXorbMetadataIndex::new(&db_path)?;

          // Phase 1: Scan all xorbs
          tracing::info!("scanning xorbs...");
          let xorbs = storage.list_xorbs().await?;
          tracing::info!("found {} xorbs", xorbs.len());

          for (i, (xorb_hash, _size)) in xorbs.iter().enumerate() {
              if (i + 1) % 100 == 0 || i + 1 == xorbs.len() {
                  tracing::info!("processing xorb {}/{}", i + 1, xorbs.len());
              }

              let xorb_data = storage.get_xorb(xorb_hash).await?;

              // Walk chunk headers to extract metadata
              let mut metadata = Vec::new();
              let mut chunk_entries = Vec::new();
              let mut pos = 0usize;
              let mut uncompressed_offset = 0u64;
              let mut chunk_idx = 0u32;

              while pos + ChunkHeader::SIZE <= xorb_data.len() {
                  let header_bytes: [u8; 8] = xorb_data[pos..pos + 8].try_into().unwrap();
                  let Ok(header) = ChunkHeader::from_bytes(&header_bytes) else { break; };

                  let compressed_start = pos;
                  let compressed_end = pos + ChunkHeader::SIZE + header.compressed_size as usize;
                  if compressed_end > xorb_data.len() { break; }

                  // Decompress to compute chunk hash
                  let compressed = &xorb_data[pos + ChunkHeader::SIZE..compressed_end];
                  let decompressed = openxet_cas_types::chunk::decompress_chunk(
                      compressed,
                      header.compression_type,
                      header.uncompressed_size as usize,
                  );

                  if let Ok(data) = decompressed {
                      let chunk_hash = compute_chunk_hash(&data);
                      let chunk_hash_hex = chunk_hash.to_hex();

                      metadata.push(XorbChunkMetadata {
                          chunk_index: chunk_idx,
                          chunk_hash: chunk_hash_hex.clone(),
                          compressed_offset_start: compressed_start as u64,
                          compressed_offset_end: compressed_end as u64,
                          uncompressed_offset,
                          uncompressed_size: data.len() as u64,
                      });

                      chunk_entries.push((
                          chunk_hash_hex,
                          ChunkLocation {
                              xorb_hash: xorb_hash.clone(),
                              chunk_index: chunk_idx,
                          },
                      ));

                      uncompressed_offset += data.len() as u64;
                  }

                  chunk_idx += 1;
                  pos = compressed_end;
              }

              // Bulk insert
              if !metadata.is_empty() {
                  xorb_meta_index.put(xorb_hash, &metadata).await?;
              }
              if !chunk_entries.is_empty() {
                  chunk_index.put_batch(&chunk_entries).await?;
              }
          }

          // Phase 2: Scan all shards
          tracing::info!("scanning shards...");
          let shards = storage.list_shards().await?;
          tracing::info!("found {} shards", shards.len());

          for (i, (shard_hash, _size)) in shards.iter().enumerate() {
              if (i + 1) % 100 == 0 || i + 1 == shards.len() {
                  tracing::info!("processing shard {}/{}", i + 1, shards.len());
              }

              let shard_data = storage.get_shard(shard_hash).await?;
              let shard = match Shard::from_bytes(&shard_data) {
                  Ok(s) => s,
                  Err(e) => {
                      tracing::warn!("skipping corrupt shard {}: {}", shard_hash, e);
                      continue;
                  }
              };

              // Index file hashes
              let file_entries: Vec<(String, String)> = shard.file_info_blocks
                  .iter()
                  .map(|fb| (fb.header.file_hash.to_hex(), shard_hash.clone()))
                  .collect();
              if !file_entries.is_empty() {
                  file_index.put_batch(&file_entries).await?;
              }

              // Index chunk hashes from CAS info (these may duplicate xorb-derived entries — that's OK)
              let chunk_entries: Vec<(String, ChunkLocation)> = shard.cas_info_blocks
                  .iter()
                  .flat_map(|cb| {
                      let xorb_hash = cb.header.cas_hash.to_hex();
                      cb.entries.iter().enumerate().map(move |(i, entry)| {
                          (entry.chunk_hash.to_hex(), ChunkLocation {
                              xorb_hash: xorb_hash.clone(),
                              chunk_index: i as u32,
                          })
                      })
                  })
                  .collect();
              if !chunk_entries.is_empty() {
                  chunk_index.put_batch(&chunk_entries).await?;
              }
          }

          let file_count = file_index.list_all().await?.len();
          tracing::info!(
              "rebuild complete: {} files, {} xorbs, {} shards indexed",
              file_count, xorbs.len(), shards.len()
          );

          Ok(())
      }
      ```

