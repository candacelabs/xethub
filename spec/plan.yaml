      /// Build a URL for downloading a xorb. Uses presigned S3 URL if available,
      /// otherwise falls back to server-proxied URL.
      async fn build_xorb_url(
          state: &AppState,
          xorb_hash: &str,
          fallback_base_url: &str,
      ) -> Result<String, AppError> {
          let expiry = Duration::from_secs(state.config.storage.presigned_url_expiry_seconds);
          if let Some(url) = state.storage.presign_xorb_url(xorb_hash, expiry).await? {
              // If external_s3_url is configured, replace the URL's host/port
              // with the external URL so clients can reach it
              if let Some(external) = &state.config.storage.external_s3_url {
                  // The presigned URL from object_store uses the internal endpoint
                  // (e.g., http://minio:9000). Replace with external URL.
                  let presigned_str = url.to_string();
                  if let Some(internal) = &state.config.storage.s3_endpoint {
                      return Ok(presigned_str.replace(internal, external));
                  }
              }
              Ok(url.to_string())
          } else {
              Ok(format!("{fallback_base_url}/v1/xorbs/default/{xorb_hash}"))
          }
      }
