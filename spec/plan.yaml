# ─── Coordinator Protocol ──────────────────────────────────────────────────────

coordinator:
  bootstrap: |
    1. Read CLAUDE.md for project context
    2. Read spec/contracts/*.proto for type contracts
    3. Read spec/plan.yaml for full DAG
    4. Run `cargo build && cargo test` to verify clean baseline
    5. Check which agents' output files already exist — resume from there

  dispatch: |
    For each level (0, 1, 2, 3):
      1. Launch all agents at this level in parallel
      2. Each agent works on its exclusive file set
      3. Each agent runs its own verification command
      4. Wait for all agents to complete
      5. Run gate check: `cargo build && cargo test`
      6. If gate fails, identify which agent's output causes the failure
      7. Fix or re-run that agent before proceeding

  gate_checks:
    level_0: "cargo build && cargo test"
    level_1: "cargo build && cargo test"
    level_2: "cargo build && cargo test"
    level_3: "cargo build && cargo test && cargo clippy"

  resume_protocol: |
    To check completion status:
    - A0: config.rs has `index_backend` field AND Cargo.toml has `rusqlite`
