      ## Task 5: Create SQLite implementations

      File: `crates/server/src/storage/index/sqlite.rs` (NEW)

      All three SQLite index types share the same DB file but use SEPARATE connections.
      Each constructor:
      1. Opens/creates the SQLite database at the given path
      2. Sets `PRAGMA journal_mode=WAL` (concurrent reads + single writer)
      3. Creates its table(s) with `CREATE TABLE IF NOT EXISTS`
      4. Wraps the Connection in `tokio::sync::Mutex`

      Use `tokio::task::spawn_blocking` for all rusqlite operations (rusqlite is synchronous).

      ### SqliteFileIndex

      ```rust
      pub struct SqliteFileIndex {
          conn: tokio::sync::Mutex<rusqlite::Connection>,
      }

      impl SqliteFileIndex {
          pub fn new(db_path: &std::path::Path) -> Result<Self, StorageError> {
              let conn = rusqlite::Connection::open(db_path)
                  .map_err(|e| StorageError::ObjectStore(format!("sqlite open error: {e}")))?;
              conn.execute_batch("PRAGMA journal_mode=WAL;")
                  .map_err(|e| StorageError::ObjectStore(format!("sqlite pragma error: {e}")))?;
              conn.execute_batch(
                  "CREATE TABLE IF NOT EXISTS files (
                      file_hash TEXT PRIMARY KEY,
                      shard_hash TEXT NOT NULL
                  );"
              ).map_err(|e| StorageError::ObjectStore(format!("sqlite create table error: {e}")))?;
              Ok(Self { conn: tokio::sync::Mutex::new(conn) })
          }
      }
      ```

      For `get()`: `SELECT shard_hash FROM files WHERE file_hash = ?`
      For `put()`: `INSERT OR REPLACE INTO files (file_hash, shard_hash) VALUES (?, ?)`
      For `list_all()`: `SELECT file_hash, shard_hash FROM files ORDER BY file_hash`
      For `put_batch()`: wrap in `BEGIN; ... COMMIT;` with prepared statement in a loop.

      ### SqliteChunkIndex

      Table: `chunks(chunk_hash TEXT, xorb_hash TEXT, chunk_index INTEGER, PRIMARY KEY(chunk_hash, xorb_hash, chunk_index))`
      Secondary index: `CREATE INDEX IF NOT EXISTS idx_chunks_xorb ON chunks(xorb_hash)`

      For `get()`: `SELECT xorb_hash, chunk_index FROM chunks WHERE chunk_hash = ?`
      For `put()`: `INSERT OR IGNORE INTO chunks (chunk_hash, xorb_hash, chunk_index) VALUES (?, ?, ?)`
      For `put_batch()`: transaction with prepared statement.
      For `get_by_xorb()`: `SELECT chunk_hash, chunk_index FROM chunks WHERE xorb_hash = ? ORDER BY chunk_index`

