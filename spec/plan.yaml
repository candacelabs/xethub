      fn generate_token(config: &AppConfig, scope: &str, repo: &str, expiry: u64) -> Result<()> {
          use openxet_server::auth::{Claims, Scope, create_token};
          use std::time::{SystemTime, UNIX_EPOCH};

          let scope = match scope {
              "read" => Scope::Read,
              "write" => Scope::Write,
              _ => anyhow::bail!("scope must be 'read' or 'write'"),
          };
          let exp = SystemTime::now()
              .duration_since(UNIX_EPOCH)?
              .as_secs() + expiry;
          let claims = Claims {
              scope,
              repo: repo.to_string(),
              exp: exp as usize,
          };
          let token = create_token(&config.auth.secret, &claims)?;
          println!("{token}");
          Ok(())
