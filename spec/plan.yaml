# spec/plan.yaml
#
# Canonical DAG for OpenXet Self-Hosted CAS Server
# 11 agents across 4 levels. Critical path: A0 → A3 → A5 → A6|A7|A8|A9|A10
#
# To execute: read this file, launch worker agents by level (level 0 first, in parallel),
# gate on `cargo test` passing before advancing to the next level.

project:
  name: "OpenXet Self-Hosted CAS Server"
  description: >
    Make OpenXet production-ready for self-hosted deployment: SQLite indexes for scale,
    presigned URL downloads, LFS transfer agent for transparent git integration,
    and Docker Compose for one-command deployment.
  repository: /home/u_kaashs/workspace/openxet
  tech_stack:
    language: Rust (edition 2024)
    runtime: tokio
    http: axum 0.8
    storage: object_store 0.11 (S3/GCS/Azure)
    database: rusqlite (bundled SQLite)
    cli: clap 4 (derive)
    config: TOML + env var overrides
    containers: Docker Compose + MinIO + Litestream + Caddy
  build_commands:
    build: "cargo build"
    test: "cargo test"
    lint: "cargo clippy"
    format_check: "cargo fmt --check"
  gate_command: "cargo test"

# ─── Dispatch Table ───────────────────────────────────────────────────────────

dispatch_table:
  - level: 0
    agents: [A0, A1, A2]
    parallelism: 3
    blocked_by: nothing
    gate: "cargo build && cargo test"
  - level: 1
    agents: [A3, A4]
    parallelism: 2
    blocked_by: [A0]
    gate: "cargo build && cargo test"
  - level: 2
    agents: [A5]
    parallelism: 1
    blocked_by: [A3, A4]
    gate: "cargo build && cargo test"
  - level: 3
    agents: [A6, A7, A8, A9, A10]
    parallelism: 5
    blocked_by: [A5]
    gate: "cargo build && cargo test && cargo clippy"

# ─── DAG Nodes ────────────────────────────────────────────────────────────────

agents:

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # LEVEL 0 — Foundation (no dependencies)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  - id: A0
    name: config_and_deps
    level: 0
    depends_on: []
    input_protos: []
    output_protos: [StorageConfigAdditions, CargoDepsAdditions, CliStructure]
    reads:
      - crates/server/src/config.rs
      - crates/server/Cargo.toml
    writes:
      - crates/server/src/config.rs
      - crates/server/Cargo.toml
    test_glob: "crates/server/src/config.rs"
    agent_prompt: |
      # Agent A0: Config & Dependencies

      You are modifying two files in the OpenXet CAS server to add configuration fields
      and dependencies needed by downstream agents.

      ## Context

      OpenXet is a Rust workspace (edition 2024) with a server crate at `crates/server/`.
      The server uses TOML config with env var overrides. See `CLAUDE.md` for full details.

      ## Task 1: Add rusqlite dependency

      File: `crates/server/Cargo.toml`

      Add to `[dependencies]`:
      ```toml
      rusqlite = { version = "0.32", features = ["bundled"] }
      ```

      The `bundled` feature compiles SQLite from source, avoiding system library
      dependencies in Docker. This is critical for reproducible builds.

      ## Task 2: Add config fields to StorageConfig

      File: `crates/server/src/config.rs`

      Add three fields to `StorageConfig`:

      ```rust
      /// Which index backend to use: "sqlite" or "filesystem"
      pub index_backend: String,

      /// Presigned URL expiry in seconds (default 3600 = 1 hour)
      pub presigned_url_expiry_seconds: u64,

      /// External S3 URL for presigned URLs (e.g., "http://minio:9000").
      /// When set, clients download xorbs directly from S3 via presigned URLs.
      /// When None, server proxies all downloads.
      pub external_s3_url: Option<String>,
      ```

      Update `Default for StorageConfig`:
      ```rust
      index_backend: "sqlite".to_string(),
      presigned_url_expiry_seconds: 3600,
      external_s3_url: None,
      ```

      Add env var overrides in `apply_env_overrides()`:
      ```rust
      if let Ok(v) = std::env::var("OPENXET_INDEX_BACKEND") {
          self.storage.index_backend = v;
      }
      if let Ok(v) = std::env::var("OPENXET_PRESIGNED_URL_EXPIRY")
          && let Ok(v) = v.parse::<u64>()
      {
          self.storage.presigned_url_expiry_seconds = v;
      }
      if let Ok(v) = std::env::var("OPENXET_EXTERNAL_S3_URL") {
          self.storage.external_s3_url = Some(v);
      }
      ```

      ## Task 3: Add CLI subcommand structure

      File: `crates/server/src/config.rs`

      Transform the `Cli` struct to support subcommands while maintaining backward compatibility
      (running without a subcommand = `serve` behavior).

      ```rust
      use clap::{Parser, Subcommand};

      #[derive(Parser, Debug)]
      #[command(name = "openxet-server", about = "OpenXet CAS server")]
      pub struct Cli {
          /// Path to the configuration file
          #[arg(short, long, default_value = "openxet.toml", global = true)]
          pub config: PathBuf,

          #[command(subcommand)]
          pub command: Option<Command>,
      }

      #[derive(Subcommand, Debug)]
      pub enum Command {
          /// Run the HTTP server (default if no subcommand given)
          Serve {
              /// Host to bind to (overrides config)
              #[arg(long)]
              host: Option<String>,
              /// Port to bind to (overrides config)
              #[arg(short, long)]
              port: Option<u16>,
              /// Data directory (overrides config)
              #[arg(long)]
              data_dir: Option<PathBuf>,
          },
          /// Rebuild indexes from S3/storage data
          RebuildIndex {
              /// Data directory for SQLite index
              #[arg(long)]
              data_dir: Option<PathBuf>,
          },
          /// Generate a JWT token for API access
          GenerateToken {
              /// Token scope: "read" or "write"
              #[arg(long, default_value = "write")]
              scope: String,
              /// Repository pattern (e.g., "*" for all)
              #[arg(long, default_value = "*")]
              repo: String,
              /// Token expiry in seconds
              #[arg(long, default_value = "86400")]
              expiry: u64,
          },
      }
      ```

      Update `AppConfig::load()` to handle the new CLI structure:
      - Extract host/port/data_dir from `Command::Serve` (or from top-level if no subcommand)
      - For backward compat, if `cli.command.is_none()`, treat it as `Serve` with no overrides
      - The old `Cli` had `host`, `port`, `data_dir` at the top level. Move them into `Command::Serve`.

      Create a helper method:
      ```rust
      impl Cli {
          /// Get serve-specific overrides (works for both explicit Serve and default None).
          pub fn serve_overrides(&self) -> (Option<&str>, Option<u16>, Option<&PathBuf>) {
              match &self.command {
                  Some(Command::Serve { host, port, data_dir }) => {
                      (host.as_deref(), *port, data_dir.as_ref())
                  }
                  None => (None, None, None),
                  _ => (None, None, None),
              }
          }
      }
      ```

      Update `AppConfig::load()` to use `cli.serve_overrides()` instead of direct field access.

      ## Tests

      Add tests to the existing `#[cfg(test)] mod tests` block (create one if none exists):

      1. `test_default_config_has_sqlite_index` — verify default index_backend is "sqlite"
      2. `test_default_presigned_url_expiry` — verify default is 3600
      3. `test_external_s3_url_default_none` — verify default is None
      4. `test_cli_no_subcommand_parses` — `Cli::try_parse_from(["openxet-server"])` succeeds
      5. `test_cli_serve_subcommand_parses` — `Cli::try_parse_from(["openxet-server", "serve", "--port", "9090"])` succeeds
      6. `test_cli_generate_token_parses` — `Cli::try_parse_from(["openxet-server", "generate-token", "--scope", "read"])` succeeds

      ## Verification

      ```bash
      cargo build -p openxet-server
      cargo test -p openxet-server config
      ```

  - id: A1
    name: docker_compose_prod
    level: 0
    depends_on: []
    input_protos: []
    output_protos: []
    reads:
      - docker/compose.minio.yaml
      - docker/Dockerfile
    writes:
      - docker/compose.prod.yaml
      - docker/litestream.yml
      - docker/Caddyfile
      - docker/.env.example
    test_glob: "docker/compose.prod.yaml"
    agent_prompt: |
      # Agent A1: Docker Compose Production Setup

      You are creating Docker Compose files for production self-hosted deployment of OpenXet
      with MinIO (S3-compatible storage), Litestream (SQLite backup), and Caddy (reverse proxy).

      ## Context

      OpenXet is a CAS server. The existing `docker/compose.minio.yaml` runs MinIO + the server
      for development. You are creating a production variant with additional services.

      The existing `docker/Dockerfile` builds the server binary. You should NOT modify it.

      ## Task 1: docker/compose.prod.yaml

      Create a production Docker Compose file with these services:

      ```yaml
      # MinIO — S3-compatible object storage
      minio:
        image: minio/minio:latest
        command: server /data --console-address ":9001"
        ports:
          - "${MINIO_API_PORT:-9000}:9000"
          - "${MINIO_CONSOLE_PORT:-9001}:9001"
        environment:
          MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
          MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
        volumes:
          - minio-data:/data
        healthcheck:
          test: ["CMD", "mc", "ready", "local"]
          interval: 5s
          timeout: 5s
          retries: 5
        restart: unless-stopped

      # MinIO init — create the bucket
      minio-init:
        image: minio/mc:latest
        depends_on:
          minio:
            condition: service_healthy
        entrypoint: >
          /bin/sh -c "
          mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
          mc mb --ignore-existing local/$${S3_BUCKET:-openxet};
          mc mb --ignore-existing local/$${BACKUP_BUCKET:-openxet-backups};
          exit 0;
          "

      # OpenXet server
      openxet:
        build:
          context: ..
          dockerfile: docker/Dockerfile
        ports:
          - "${OPENXET_PORT:-8080}:8080"
        depends_on:
          minio-init:
            condition: service_completed_successfully
          litestream-restore:
            condition: service_completed_successfully
        volumes:
          - openxet-data:/data
        environment:
          OPENXET_HOST: "0.0.0.0"
          OPENXET_PORT: "8080"
          OPENXET_DATA_DIR: /data
          OPENXET_AUTH_SECRET: ${AUTH_SECRET:-change-me-in-production}
          OPENXET_STORAGE_BACKEND: s3
          OPENXET_S3_BUCKET: ${S3_BUCKET:-openxet}
          OPENXET_S3_REGION: ${S3_REGION:-us-east-1}
          OPENXET_S3_ENDPOINT: http://minio:9000
          OPENXET_S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
          OPENXET_S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
          OPENXET_S3_ALLOW_HTTP: "true"
          OPENXET_INDEX_BACKEND: sqlite
          OPENXET_EXTERNAL_S3_URL: http://${EXTERNAL_HOST:-localhost}:${MINIO_API_PORT:-9000}
          OPENXET_PRESIGNED_URL_EXPIRY: ${PRESIGNED_URL_EXPIRY:-3600}
        healthcheck:
          test: ["CMD", "curl", "-f", "http://localhost:8080/api/stats"]
          interval: 10s
          timeout: 5s
          retries: 3
          start_period: 10s
        restart: unless-stopped

      # Litestream — restore SQLite from backup on startup
      litestream-restore:
        image: litestream/litestream:latest
        entrypoint: >
          /bin/sh -c "
          litestream restore -if-replica-exists -config /etc/litestream.yml /data/index.db || true;
          "
        volumes:
          - openxet-data:/data
          - ./litestream.yml:/etc/litestream.yml:ro
        environment:
          LITESTREAM_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
          LITESTREAM_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}

      # Litestream — continuous replication sidecar
      litestream:
        image: litestream/litestream:latest
        command: replicate -config /etc/litestream.yml
        depends_on:
          openxet:
            condition: service_healthy
        volumes:
          - openxet-data:/data
          - ./litestream.yml:/etc/litestream.yml:ro
        environment:
          LITESTREAM_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
          LITESTREAM_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
        restart: unless-stopped

      # Caddy — reverse proxy with automatic TLS (optional)
      caddy:
        image: caddy:2-alpine
        ports:
          - "${HTTP_PORT:-80}:80"
          - "${HTTPS_PORT:-443}:443"
        volumes:
          - ./Caddyfile:/etc/caddy/Caddyfile:ro
          - caddy-data:/data
          - caddy-config:/config
        depends_on:
          openxet:
            condition: service_healthy
        restart: unless-stopped
        profiles:
          - with-proxy

      volumes:
        minio-data:
        openxet-data:
        caddy-data:
        caddy-config:
      ```

      Key design decisions:
      - `litestream-restore` runs BEFORE `openxet` starts (restores SQLite from backup)
      - `litestream` runs as a sidecar AFTER `openxet` is healthy (continuous replication)
      - Caddy is in a `with-proxy` profile — only starts with `docker compose --profile with-proxy up`
      - All secrets are parameterized via `.env` file
      - Named volumes for persistence

      ## Task 2: docker/litestream.yml

      ```yaml
      dbs:
        - path: /data/index.db
          replicas:
            - type: s3
              bucket: ${BACKUP_BUCKET:-openxet-backups}
              path: sqlite/
              endpoint: http://minio:9000
              force-path-style: true
      ```

      ## Task 3: docker/Caddyfile

      ```
      {$DOMAIN:localhost} {
          reverse_proxy openxet:8080

          # MinIO presigned URL passthrough
          handle /openxet/* {
              reverse_proxy minio:9000
          }
      }
      ```

      ## Task 4: docker/.env.example

      ```env
      # ── MinIO ──
      MINIO_ROOT_USER=minioadmin
      MINIO_ROOT_PASSWORD=changeme-minio-password
      MINIO_API_PORT=9000
      MINIO_CONSOLE_PORT=9001

      # ── OpenXet ──
      AUTH_SECRET=changeme-auth-secret
      OPENXET_PORT=8080
      EXTERNAL_HOST=localhost
      PRESIGNED_URL_EXPIRY=3600

      # ── S3 ──
      S3_BUCKET=openxet
      S3_REGION=us-east-1
      BACKUP_BUCKET=openxet-backups

      # ── Caddy (only with --profile with-proxy) ──
      DOMAIN=localhost
      HTTP_PORT=80
      HTTPS_PORT=443
      ```

      ## Verification

      Run: `docker compose -f docker/compose.prod.yaml config` — should print resolved YAML without errors.
      Run: `docker compose -f docker/compose.prod.yaml --profile with-proxy config` — should include caddy.

      These are the ONLY files you create. Do NOT modify the existing Dockerfile or compose.minio.yaml.

  - id: A2
    name: lfs_transfer_agent
    level: 0
    depends_on: []
    input_protos: []
    output_protos: []
    reads:
      - Cargo.toml
      - crates/chunking/src/gearhash.rs
      - crates/hashing/src/merkle_hash.rs
      - crates/cas_types/src/xorb.rs
      - crates/cas_types/src/shard.rs
      - crates/cas_types/src/reconstruction.rs
    writes:
      - Cargo.toml
      - crates/lfs-agent/Cargo.toml
      - crates/lfs-agent/src/main.rs
      - crates/lfs-agent/src/protocol.rs
      - crates/lfs-agent/src/client.rs
      - crates/lfs-agent/src/upload.rs
      - crates/lfs-agent/src/download.rs
    test_glob: "crates/lfs-agent/src/**/*_test*"
    agent_prompt: |
      # Agent A2: LFS Custom Transfer Agent

      You are creating a new Rust crate implementing the git-lfs custom transfer agent protocol.
      This binary speaks JSON over stdin/stdout with git-lfs and communicates with the OpenXet
      server via HTTP.

      ## Context

      Reference: https://github.com/git-lfs/git-lfs/blob/main/docs/custom-transfers.md

      The LFS custom transfer protocol:
      1. git-lfs spawns the agent binary
      2. Agent reads JSON messages from stdin, writes JSON responses to stdout
      3. Messages: {"event": "init", ...}, {"event": "upload", ...}, {"event": "download", ...}, {"event": "terminate"}
      4. Responses: {"event": "complete", "oid": "...", ...} or {"event": "progress", ...}

      The OpenXet server API:
      - POST /v1/xorbs/default/{hash} — upload xorb (body = serialized xorb bytes)
      - POST /v1/shards — upload shard (body = serialized shard bytes)
      - GET /v1/reconstructions/{file_id} — get reconstruction info (returns JSON with terms + fetch_info)
      - GET /v1/chunks/default-merkledb/{hash} — dedup query (returns shard binary)
      - GET /v1/xorbs/default/{hash} — download xorb data (supports Range header)
      - All endpoints require `Authorization: Bearer <token>` header

      ## Task 1: Workspace Cargo.toml

      File: `Cargo.toml` (workspace root)

      Add `"crates/lfs-agent"` to the `members` array:
      ```toml
      [workspace]
      members = ["crates/*"]
      ```
      Since this uses a glob, no change needed IF the glob already matches. Verify the glob
      `"crates/*"` will pick up `crates/lfs-agent`. It should — glob matches one level.

      ## Task 2: crates/lfs-agent/Cargo.toml

      ```toml
      [package]
      name = "openxet-lfs-agent"
      version = "0.1.0"
      edition.workspace = true
      license.workspace = true

      [[bin]]
      name = "openxet-lfs-agent"
      path = "src/main.rs"

      [dependencies]
      openxet-hashing = { workspace = true }
      openxet-chunking = { workspace = true }
      openxet-cas-types = { workspace = true }
      tokio = { version = "1", features = ["full"] }
      serde = { workspace = true }
      serde_json = { workspace = true }
      anyhow = { workspace = true }
      bytes = { workspace = true }
      reqwest = { version = "0.12", features = ["json"] }
      tracing = "0.1"
      tracing-subscriber = { version = "0.3", features = ["env-filter"] }

      [dev-dependencies]
      tempfile = "3"
      ```

      ## Task 3: crates/lfs-agent/src/protocol.rs

      Implement the git-lfs custom transfer agent JSON protocol:

      ```rust
      use serde::{Deserialize, Serialize};

      #[derive(Debug, Deserialize)]
      #[serde(tag = "event")]
      #[serde(rename_all = "lowercase")]
      pub enum LfsRequest {
          Init {
              operation: String,  // "upload" or "download"
              remote: Option<String>,
              concurrent: Option<bool>,
              concurrenttransfers: Option<u32>,
          },
          Upload {
              oid: String,
              size: u64,
              path: String,
              action: Option<LfsAction>,
          },
          Download {
              oid: String,
              size: u64,
              action: Option<LfsAction>,
          },
          Terminate,
      }

      #[derive(Debug, Deserialize)]
      pub struct LfsAction {
          pub href: Option<String>,
          pub header: Option<std::collections::HashMap<String, String>>,
          pub expires_at: Option<String>,
      }

      #[derive(Debug, Serialize)]
      #[serde(untagged)]
      pub enum LfsResponse {
          InitComplete {},
          Progress {
              event: String,  // "progress"
              oid: String,
              #[serde(rename = "bytesSoFar")]
              bytes_so_far: u64,
              #[serde(rename = "bytesSinceLast")]
              bytes_since_last: u64,
          },
          Complete {
              event: String,  // "complete"
              oid: String,
              #[serde(skip_serializing_if = "Option::is_none")]
              path: Option<String>,
              #[serde(skip_serializing_if = "Option::is_none")]
              error: Option<LfsError>,
          },
      }

      #[derive(Debug, Serialize)]
      pub struct LfsError {
          pub code: i32,
          pub message: String,
      }
      ```

      Read requests from stdin line-by-line (each line is a JSON object).
      Write responses to stdout (one JSON object per line, followed by newline).

      ## Task 4: crates/lfs-agent/src/client.rs

      HTTP client for the OpenXet server:

      ```rust
      pub struct OpenXetClient {
          http: reqwest::Client,
          base_url: String,
          token: String,
      }

      impl OpenXetClient {
          pub fn new(base_url: &str, token: &str) -> Self { ... }

          /// Upload a serialized xorb. Returns true if newly inserted.
          pub async fn upload_xorb(&self, hash: &str, data: bytes::Bytes) -> anyhow::Result<bool> { ... }

          /// Upload a serialized shard.
          pub async fn upload_shard(&self, data: bytes::Bytes) -> anyhow::Result<()> { ... }

          /// Get reconstruction info for a file.
          pub async fn get_reconstruction(&self, file_id: &str)
              -> anyhow::Result<openxet_cas_types::reconstruction::QueryReconstructionResponse> { ... }

          /// Download xorb data (with optional byte range).
          pub async fn download_xorb_range(&self, url: &str, start: u64, end: u64)
              -> anyhow::Result<bytes::Bytes> { ... }

          /// Download full URL (for presigned URLs that don't need auth).
          pub async fn download_url(&self, url: &str) -> anyhow::Result<bytes::Bytes> { ... }
      }
      ```

      Configuration from env vars:
      - `OPENXET_SERVER` — base URL (e.g., "http://localhost:8080")
      - `OPENXET_TOKEN` — JWT token

      ## Task 5: crates/lfs-agent/src/upload.rs

      Upload flow:
      1. Read the file from `path` (given by LFS)
      2. CDC chunk it using `openxet_chunking::chunk_data()`
      3. Compute chunk hashes using `openxet_hashing::compute_chunk_hash()`
      4. Split chunks into xorb groups (respecting XORB_SOFT_LIMIT = 60 MiB)
      5. For each xorb group:
         a. Serialize using `openxet_cas_types::xorb::serialize_single_chunk()` for each chunk
         b. Compute xorb hash using `openxet_cas_types::xorb::compute_xorb_hash()`
         c. Upload via `client.upload_xorb()`
      6. Build shard (file_info_blocks + cas_info_blocks) using types from `openxet_cas_types::shard`
      7. Upload shard via `client.upload_shard()`
      8. Report file_hash as the OID to LFS

      Use `openxet_cas_types::chunk::CompressionType::Lz4` for compression.
      Compute file hash using `openxet_hashing::compute_file_hash()`.

      IMPORTANT: Follow the same xorb splitting and shard construction logic as
      `crates/server/src/routes/management.rs::process_file_upload()`. Study that function
      carefully — it is the reference implementation.

      ## Task 6: crates/lfs-agent/src/download.rs

      Download flow:
      1. Query reconstruction: `client.get_reconstruction(oid)`
      2. For each term in `response.terms`:
         a. Get the fetch_info for this term's xorb hash
         b. Download the xorb data from the URL in fetch_info (may be presigned S3 URL)
         c. Use Range header with url_range.start and url_range.end
      3. Decompress each chunk using `openxet_cas_types::xorb::deserialize_xorb_range()`
      4. Concatenate decompressed chunks to reconstruct the file
      5. Apply `offset_into_first_range` if non-zero (trim leading bytes)
      6. Write to the path specified by LFS

      ## Task 7: crates/lfs-agent/src/main.rs

      Main loop:
      ```rust
      #[tokio::main]
      async fn main() -> anyhow::Result<()> {
          // Read config from env
          let server_url = std::env::var("OPENXET_SERVER")
