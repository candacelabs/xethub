      IMPORTANT: All rusqlite calls must be wrapped in `spawn_blocking` because
      rusqlite::Connection is not Send. Use a pattern like:

      ```rust
      let conn = self.conn.lock().await;
      let result = {
          // Clone what you need before moving into the closure
          let hash = chunk_hash.to_string();
          tokio::task::spawn_blocking(move || {
              // ... use conn ...
          }).await.map_err(|e| StorageError::ObjectStore(format!("task join error: {e}")))?
      };
      ```

      Wait — actually, `Mutex<Connection>` with the lock held across `spawn_blocking`
      won't work because MutexGuard is not Send. Instead, use this pattern:

      ```rust
      // DON'T hold the MutexGuard across spawn_blocking.
      // Instead, take the connection out briefly:
      // Actually, the simplest pattern for rusqlite + tokio is:
      //   Use std::sync::Mutex (not tokio::sync::Mutex) so you can lock inside spawn_blocking.
      ```

      Actually, the correct pattern for rusqlite + tokio:

      ```rust
      use std::sync::Mutex;  // NOT tokio::sync::Mutex

      pub struct SqliteFileIndex {
          conn: Mutex<rusqlite::Connection>,
      }

      // rusqlite::Connection is Send but not Sync.
      // Wrapping in std::sync::Mutex<Connection> makes it Sync.
      // Access pattern:
      impl FileIndex for SqliteFileIndex {
          async fn get(&self, file_hash: &str) -> Result<Option<String>, StorageError> {
              validate_hash(file_hash)?;
              let hash = file_hash.to_string();
              let conn = self.conn.lock()
                  .map_err(|e| StorageError::ObjectStore(format!("mutex poisoned: {e}")))?;
              let result = conn.query_row(
                  "SELECT shard_hash FROM files WHERE file_hash = ?",
                  [&hash],
                  |row| row.get::<_, String>(0),
              );
              match result {
                  Ok(shard_hash) => Ok(Some(shard_hash)),
                  Err(rusqlite::Error::QueryReturnedNoRows) => Ok(None),
                  Err(e) => Err(StorageError::ObjectStore(format!("sqlite query error: {e}"))),
              }
          }
      }
      ```

      For bulk operations with transactions:
      ```rust
      async fn put_batch(&self, entries: &[(String, String)]) -> Result<(), StorageError> {
          if entries.is_empty() { return Ok(()); }
          let entries = entries.to_vec();
          let conn = self.conn.lock()
              .map_err(|e| StorageError::ObjectStore(format!("mutex poisoned: {e}")))?;
          let tx = conn.unchecked_transaction()
              .map_err(|e| StorageError::ObjectStore(format!("sqlite tx error: {e}")))?;
          {
              let mut stmt = tx.prepare("INSERT OR REPLACE INTO files (file_hash, shard_hash) VALUES (?, ?)")
                  .map_err(|e| StorageError::ObjectStore(format!("sqlite prepare error: {e}")))?;
              for (fh, sh) in &entries {
                  stmt.execute(rusqlite::params![fh, sh])
                      .map_err(|e| StorageError::ObjectStore(format!("sqlite insert error: {e}")))?;
              }
          }
          tx.commit()
              .map_err(|e| StorageError::ObjectStore(format!("sqlite commit error: {e}")))?;
          Ok(())
      }
      ```

      Note: use `conn.unchecked_transaction()` rather than `conn.transaction()` because
      `transaction()` requires `&mut self` but `Mutex::lock()` gives `MutexGuard<Connection>`
      which derefs to `&Connection`, not `&mut Connection`.

