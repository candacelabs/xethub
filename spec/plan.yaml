      use std::time::Duration;
      use url::Url;

      pub struct ObjectStoreBackend {
          store: Arc<dyn ObjectStore>,
          signer: Option<Arc<dyn object_store::signer::Signer>>,
      }

      impl ObjectStoreBackend {
          pub fn new(
              store: Arc<dyn ObjectStore>,
              signer: Option<Arc<dyn object_store::signer::Signer>>,
          ) -> Self {
              Self { store, signer }
          }

          /// Generate a presigned GET URL for a xorb.
          /// Returns None if presigning is not available (no signer configured).
          pub async fn presign_xorb_url(
              &self,
              hash: &str,
              expiry: Duration,
          ) -> Result<Option<Url>, StorageError> {
              let Some(signer) = &self.signer else {
                  return Ok(None);
              };
              let path = Self::xorb_path(hash);
              let url = signer
                  .signed_url(
                      http::Method::GET,
                      &path,
                      expiry,
                  )
                  .await
                  .map_err(|e| StorageError::ObjectStore(format!("presign error: {e}")))?;
              Ok(Some(url))
          }
      }
      ```

