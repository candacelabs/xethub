[tools]
rust = "latest"
bun = "latest"
watchexec = "latest"
uv = "latest"
prek = "latest"

[env]
HF_XET_ENDPOINT="http://localhost:8080"

[tasks.jwt]
run = """
#!/usr/bin/env -S uv run --script
# /// script
# dependencies = ["pyjwt"]
# ///

import jwt, time

secret = 'change-me-in-production'  # must match OPENXET_AUTH_SECRET
token = jwt.encode({
    'scope': 'write',
    'repo': 'test/repo',
    'exp': int(time.time()) + 86400
}, secret, algorithm='HS256')
print(token)
"""

# ── Docker ─────────────────────────────────────────────────────────────────────

[tasks.docker-up]
description = "Bring up docker compose services"
run = "docker compose -f docker/compose.minio.yaml up -d --build --force-recreate --remove-orphans"
alias = "up"

[tasks.docker-down]
description = "bring down docker compose services"
run = "docker compose -f docker/compose.minio.yaml down --remove-orphans"
alias = "down"

[tasks.docker-log]
description = "view docker lgos"
run = "docker compose -f docker/compose.minio.yaml logs --tail 100"
alias = "log"

# ── Build ─────────────────────────────────────────────────────────────────────

[tasks.build]
description = "Build all crates (debug)"
run = "cargo build"
sources = ["Cargo.toml", "crates/**/Cargo.toml", "crates/**/*.rs"]

[tasks.build-release]
description = "Build all crates (release)"
run = "cargo build --release"
sources = ["Cargo.toml", "crates/**/Cargo.toml", "crates/**/*.rs"]

# ── Test ──────────────────────────────────────────────────────────────────────

[tasks.test]
description = "Run all tests"
run = "cargo test"
env = { RUST_BACKTRACE = "1" }

[tasks.test-unit]
description = "Run unit tests only"
run = "cargo test --lib"

[tasks.test-integration]
description = "Run integration tests only"
run = "cargo test --test '*'"
env = { RUST_BACKTRACE = "1" }

# ── Lint & Format ─────────────────────────────────────────────────────────────

[tasks.lint]
description = "Run clippy on all crates"
run = "cargo clippy -- -D warnings"

[tasks.fmt]
description = "Format all Rust code"
run = "cargo fmt --all"

[tasks.fmt-check]
description = "Check Rust formatting"
run = "cargo fmt --all --check"

[tasks.check]
description = "Run fmt check, clippy, and tests"
depends = ["fmt-check", "lint", "test"]

# ── Frontend ──────────────────────────────────────────────────────────────────

[tasks.fe-install]
description = "Install frontend dependencies"
run = "bun install"
dir = "web"

[tasks.fe-build]
description = "Build frontend for production"
depends = ["fe-install"]
sources = ["src/*"]
run = "bun run build"
dir = "web"

[tasks.fe-lint]
description = "Lint frontend code"
run = "bun run lint"
dir = "web"

# ── Run ───────────────────────────────────────────────────────────────────────

[tasks.dev]
description = "Run the server in debug mode"
depends = ["build", "fe-build"]
run = "cargo run"

[tasks.clean]
description = "Clean build artifacts"
run = "cargo clean"
