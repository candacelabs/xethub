services:
  openxet:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "${OPENXET_PORT:-8080}:8080"
    volumes:
      - .data:/.data
    environment:
      - OPENXET_HOST=0.0.0.0
      - OPENXET_PORT=8080
      - OPENXET_DATA_DIR=/.data
      - OPENXET_AUTH_SECRET=change-me-in-production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/stats"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
